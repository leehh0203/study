<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Modal Fixture</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: #f7efe8;
        color: #231d19;
      }
      body.scroll-lock {
        overflow: hidden;
      }
      .page {
        width: min(100% - 32px, 720px);
        margin: 48px auto;
        padding: 24px;
        border: 1px solid #dfcfc1;
        border-radius: 24px;
        background: #fffdf9;
      }
      .open-modal,
      .close-modal {
        padding: 12px 16px;
        border: 0;
        border-radius: 12px;
        background: #cb6d37;
        color: #fff;
        cursor: pointer;
        font: inherit;
      }
      .modal {
        display: none;
        position: fixed;
        inset: 0;
      }
      .modal.open {
        display: block;
      }
      .modal-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.45);
      }
      .modal-content {
        position: relative;
        width: min(100% - 32px, 420px);
        margin: 12vh auto 0;
        padding: 24px;
        border-radius: 20px;
        background: #fff;
        z-index: 1;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <h1>모달 예제</h1>
      <p>여러 이벤트가 모두 isOpen 하나만 바꾸게 정리하는 훈련입니다.</p>
      <button class="open-modal">모달 열기</button>
    </main>

    <div class="modal">
      <div class="modal-overlay"></div>
      <section 
        class="modal-content" 
        role="dialog"
        aria-modal="true" 
        aria-labelledby="modal-title" 
        aria-describedby="modal-desc"
      >
        <h2 id="modal-title">모달</h2>
        <p id="modal-desc">닫기, ESC, 오버레이 클릭을 한 흐름으로 묶어보세요.</p>
        <button class="close-modal">닫기</button>
      </section>
    </div>

    <script>
      const openButton = document.querySelector('.open-modal');
      const modal = document.querySelector('.modal');
      const closeButton = modal.querySelector('.close-modal');
      const overlay = modal.querySelector('.modal-overlay');

      let isOpen = false;


      // render
      function render(){
        modal.classList.toggle('open', isOpen);
      };

      // state
      function setOpen(nextOpen) {

        if (isOpen === nextOpen) return;

        isOpen = nextOpen;
        render();
      };
    
      // event
      openButton.addEventListener('click', () => {
        setOpen(true);
      });

      closeButton.addEventListener('click', () => {
        setOpen(false);
      });

      overlay.addEventListener('click', () => {
        setOpen(false);
      });

      window.addEventListener('keydown', (e) => {
        if (e.key === "Escape") {
          e.preventDefault();
          setOpen(false);
        }
      });

    </script>
  </body>
</html>
