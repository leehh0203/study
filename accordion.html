<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Accordion Fixture</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: #f2f4f0;
        color: #1d241d;
      }
      .page {
        width: min(100% - 32px, 720px);
        margin: 48px auto;
        padding: 24px;
        border: 1px solid #d7ddd3;
        border-radius: 24px;
        background: #fbfdf9;
      }
      .accordion-item + .accordion-item {
        margin-top: 12px;
      }
      .accordion-item {
        border: 1px solid #d8e0d2;
        border-radius: 16px;
        overflow: hidden;
        background: #fff;
      }
      .accordion-button {
        width: 100%;
        padding: 16px 18px;
        border: 0;
        background: #eef4e7;
        text-align: left;
        font: inherit;
        cursor: pointer;
      }
      .accordion-button.open {
        background: #dcebcf;
      }
      .accordion-panel {
        display: none;
        padding: 18px;
      }
      .accordion-panel.open {
        display: block;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <h1>아코디언 예제</h1>
      <article class="accordion-item">
        <button 
          id="accordion-button-a1"
          class="accordion-button"
          aria-expanded="false"
          aria-controls="accordion-panel-a1"
          data-target="accordion-panel-a1"
        >
          상태는 무엇인가?
        </button>
        <div 
          id="accordion-panel-a1" 
          class="accordion-panel" 
          role="region" 
          aria-labelledby="accordion-button-a1"
        >
          열림 여부를 DOM class가 아니라 상태로 봐야 합니다.
        </div>
      </article>
      <article class="accordion-item">
        <button 
          id="accordion-button-a2"
          class="accordion-button"
          aria-expanded="false"
          aria-controls="accordion-panel-a2"
          data-target="accordion-panel-a2"
        >
          single과 multi의 차이
        </button>
        <div 
          id="accordion-panel-a2" 
          class="accordion-panel" 
          role="region" 
          aria-labelledby="accordion-button-a2"
        >
          openId와 openIds는 구조가 다릅니다.
        </div>
      </article>
      <article class="accordion-item">
        <button 
          id="accordion-button-a3"
          class="accordion-button"
          aria-expanded="false"
          aria-controls="accordion-panel-a3"
          data-target="accordion-panel-a3"
        >
          리팩토링 포인트
        </button>
        <div 
          id="accordion-panel-a3" 
          class="accordion-panel" 
          role="region" 
          aria-labelledby="accordion-button-a3"
        >
          DOM을 읽어 판단하지 말고 상태를 먼저 정의합니다.
        </div>
      </article>
    </main>

    <script>
      const accordionButton = [...document.querySelectorAll('.accordion-button')];
      const accordionPanel = [...document.querySelectorAll('.accordion-panel')];

      let openItemId = ""

      // 가드 함수
      function hasPanel(buttonId) {
        return accordionPanel.some((panel) => panel.id === buttonId);
      };

      //상태 변경 함수
      function setOpenItem(nextopenItemId) {
        if (!hasPanel(nextopenItemId)) return;

        openItemId = nextopenItemId;
        render();
      }

      //화면 반영 함수String
      function render() {
        accordionButton.forEach((button) => {
          const isOpen = button.dataset.target === openItemId;

          button.classList.toggle("open", isOpen);
          button.setAttribute("aria-expanded", String(isOpen));

          button.tabIndex = isOpen ? 0 : -1;
        })
        
        accordionPanel.forEach((panel) => {
          const isOpen = panel.id === openItemId;
          
          panel.classList.toggle("open", isOpen);
          panel.hidden = !isOpen;
          
        });
      }

      // 포커스이동
      function focusButton(index) {
        const nextButton = accordionButton[index];

        if (!nextButton) return;

        nextButton.focus();
      }

      // 순환인덱스
      function getNextIndex(currentIndex, direction) {
        // currentIndex = 현재 인덱스
        // direction 방향
        return (currentIndex + direction + accordionButton.length) % accordionButton.length;
      }
      
      //key 이동
      accordionButton.forEach((button, index) => {
        button.addEventListener("keydown", (e) => {

          //오른쪽으로 이동
          if (e.key === "ArrowRight") {
            e.preventDefault();
            focusButton(getNextIndex(index, 1));
            return;
            
          }

          //왼쪽으로 이동
          if (e.key === "ArrowLeft") {
            e.preventDefault();
            focusButton(getNextIndex(index, -1));
            return;
          }

          //맨 처음 인덱스로 이동
          if (e.key === "Home") {
            e.preventDefault();
            focusButton(0);
            return;
          }

          //맨 마지막 인덱스로 이동
          if (e.key === "End") {
            e.preventDefault();
            focusButton(accordionButton.length - 1);
            return;
          }

          //엔터,스페이스바 눌렀을때 open
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            setOpenItem(button.dataset.target)
          }

        })
      });


      //실행 함수
      accordionButton.forEach(button => {
        button.addEventListener('click', () => {
          setOpenItem(button.dataset.target);
        });
      });

    </script>
  </body>
</html>
